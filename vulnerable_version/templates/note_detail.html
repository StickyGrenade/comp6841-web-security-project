{% extends "base.html" %}

{% block title %}{{ note["title"] }} - VulnerableNotes{% endblock %}

{% block content %}
  <article class="card">
    <p><a href="{{ url_for('notes') }}">Back to my notes</a></p>

    <h1>{{ note["title"] }}</h1>
    <p class="note-meta">Created {{ note["created_at"] }}</p>
    <div class="note-body">
      <p>{{ note["body"] }}</p>
    </div>
  </article>
{% endblock %}
